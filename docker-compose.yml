services:
  postgres:
    image: postgres:16-alpine
    container_name: quini_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quini}
      POSTGRES_USER: ${POSTGRES_USER:-quini}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quini_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - quini_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quini} -d ${POSTGRES_DB:-quini}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quini_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: America/Argentina/Buenos_Aires
      DATABASE_URL: postgresql://${POSTGRES_USER:-quini}:${POSTGRES_PASSWORD:-quini_secret}@postgres:5432/${POSTGRES_DB:-quini}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID:-}
      INVITE_CODE: ${INVITE_CODE:-}
      MAX_TICKETS_PER_USER: ${MAX_TICKETS_PER_USER:-10}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quini_network
    ports:
      - "3000:3000"

networks:
  quini_network:
    driver: bridge

volumes:
  postgres_data:
